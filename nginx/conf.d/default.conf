# =============================================================================
# AgriProfit — Nginx Reverse Proxy (IP / no-domain mode)
#
# Single server block with path-based routing:
#   http://YOUR-EC2-IP/          → Next.js frontend (frontend:3000)
#   http://YOUR-EC2-IP/api/      → FastAPI backend  (backend:8000)
#   http://YOUR-EC2-IP/uploads/  → FastAPI uploads  (backend:8000)
#
# When you get a domain, replace this file with the domain version:
#   - Add two server blocks (frontend + api subdomain)
#   - Add SSL directives
#   - See nginx/ssl/README.md for cert setup
# =============================================================================

# Shared upstream definitions
upstream frontend_app {
    server frontend:3000;
}

upstream backend_api {
    server backend:8000;
}

# Gzip — compress API JSON and frontend assets
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/x-javascript
    image/svg+xml;

server {
    listen 80;
    server_name _;   # matches any hostname / bare IP

    # ------------------------------------------------------------------
    # API — all /api/ and /uploads/ traffic → FastAPI backend
    # ------------------------------------------------------------------
    location /api/ {
        proxy_pass         http://backend_api;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Raise body limit for image uploads (backend cap is 5 MB)
        client_max_body_size 10m;

        # ML inference on first request can take 10-20 s
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;

        proxy_buffering off;
    }

    location /uploads/ {
        proxy_pass         http://backend_api;
        proxy_http_version 1.1;

        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        add_header Cache-Control "public, max-age=86400";
    }

    # Health check passthrough (used by Docker and load balancers)
    location /health {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ------------------------------------------------------------------
    # Frontend — everything else → Next.js
    # ------------------------------------------------------------------
    location / {
        proxy_pass         http://frontend_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Next.js
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
    }

    # Cache Next.js static assets (content-hashed, safe to cache forever)
    location /_next/static/ {
        proxy_pass       http://frontend_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
